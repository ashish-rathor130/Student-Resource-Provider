
  <style>
    body {
      {% comment %} margin: 0; {% endcomment %}
      {% comment %} font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; {% endcomment %}
    }

    footer {
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      color: #fff;
      padding: 0.5rem 1rem;
    }

    .footer-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      max-width: 1200px;
      margin: auto;
    }

    .footer-section {
      flex: 1 1 250px;
      margin: 1rem;
      justify-items: center;
    }

    .footer-section h3 {
      margin-bottom:10px;
      font-size: 1.2rem;
      border-bottom: 2px solid #ffdd57;
      display: inline-block;
      padding-bottom: 0.3rem;
    }

    .footer-section ul {
      list-style: none;
      padding: 0;
    }

    .footer-section ul li {
      margin: 0.5rem 0;
    }

    .footer-section ul li a {
      text-decoration: none;
      color: #fff;
      transition: color 0.3s ease;
    }

    .footer-section ul li a:hover {
      color: #ffdd57;
    }

    .social-icons {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .social-icons a {
      text-decoration: none;
      color: #fff;
      font-size: 1.2rem;
      transition: color 0.3s ease;
    }

    .social-icons a:hover {
      color: #ffdd57;
    }

    .footer-bottom {
      text-align: center;
      padding:10px;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.3);
    }

    @media (max-width: 768px) {
      .footer-container {
        flex-direction: column;
        align-items: center;
      }
      .footer-section{
        margin:0px;
        padding:0px;
      }
      .footer-section ul {
        margin:0px;
        padding:0px;
      }
      .footer-section {
        text-align: center;
      }
    }
  </style>

  <footer>
    <div class="footer-container">
      <div class="footer-section">
        <h3>Quick Links</h3>
        <ul>
          <li><a href="{% url "home" %}">Home</a></li>
          <li><a href="{% url "about" %}">AboutUs</a></li>
          {% comment %} <li><a href="{% url "notes" %}">Notes</a></li> {% endcomment %}
          <li><a href="{% url "papers" %}">Previous Year Paper</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h3>Contact</h3>
        <p>Email: anvdgroup@gmail.com</p>
        <p>Phone: +91-9876543210</p>
      </div>
      <div class="footer-section">
        <h3>Follow Us</h3>
        <div class="social-icons">
          <a href="#">🌐</a>
          <a href="#">📘</a>
          <a href="#">🐦</a>
          <a href="#">📸</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      © 2026 Student Resource Provider | Designed for learners
    </div>
  </footer>
